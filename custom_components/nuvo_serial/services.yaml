configure_time:
  fields:
    device_id:
      required: true
      selector:
        device:
          filter:
            integration: "nuvo_serial"
            model: "Grand Concerto NV-I8G"
    datetime:
      required: true
      selector:
        datetime:

set_source_display:
  fields:
    device_id:
      required: true
      selector:
        device:
          filter:
            integration: "nuvo_serial"
            model: "Source"
    line1:
      required: false
      selector:
        text:
    line2:
      required: false
      selector:
        text:
    line3:
      required: false
      selector:
        text:
    line4:
      required: false
      selector:
        text:

set_source_track:
  fields:
    device_id:
      required: true
      selector:
        device:
          filter:
            integration: "nuvo_serial"
            model: "Source"
    track_duration:
      required: true
      selector:
        number:
          min: 0
          mode: box
    track_position:
      required: true
      selector:
        number:
          min: 0
          mode: box
    status:
      required: true
      selector:
        select:
          options:
            - "Normal"
            - "Idle"
            - "Playing"
            - "Paused"
            - "Fast Forward"
            - "Rewind"
            - "Play Shuffle"
            - "Play Repeat"
            - "Play Shuffle Repeat"

snapshot:
  fields:
    entity_id:
      required: true
      selector:
        entity:
          integration: "nuvo_serial"
          domain: "media_player"
          multiple: true

restore:
  fields:
    entity_id:
      required: true
      selector:
        entity:
          integration: "nuvo_serial"
          domain: "media_player"
